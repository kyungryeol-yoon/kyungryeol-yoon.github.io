<header class="site-header">
  <div class="wrap">
    <div class="header-left">
      <a class="brand" href="{{ "/" | relURL }}">
        {{ with .Site.Params.avatar }}<img class="brand-avatar" src="{{ . | relURL }}" alt="{{ $.Site.Params.author }}" width="28" height="28" loading="eager">{{ end }}
        <span>{{ .Site.Title }}</span>
      </a>
      <span class="social brand-social">{{ partial "social.html" . }}</span>
    </div>
    <nav class="nav">
      <div class="nav-links" id="primary-nav">
        <a href="{{ "/" | relURL }}"{{ if .IsHome }} class="active"{{ end }}>Home</a>
        <a href="{{ "/archives/" | relURL }}"{{ if hasPrefix .RelPermalink "/archives" }} class="active"{{ end }}>Archives</a>
        <a href="{{ "/categories/" | relURL }}"{{ if or (hasPrefix .RelPermalink "/categories") (and .IsSection (not .IsHome)) }} class="active"{{ end }}>Categories</a>
        <a href="{{ "/tags/" | relURL }}"{{ if hasPrefix .RelPermalink "/tags" }} class="active"{{ end }}>Tags</a>
        <span class="social nav-social">{{ partial "social.html" . }}</span>
      </div>
      <button class="search-trigger" id="search-trigger" aria-label="Search (Ctrl/Cmd+K)" title="Search (⌘K)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span>Search</span>
        <kbd class="kbd-hint">⌘K</kbd>
      </button>
      <button class="icon-btn" id="theme-toggle" aria-label="다크모드 전환" title="다크모드 전환">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <button class="icon-btn nav-toggle" id="nav-toggle" aria-label="메뉴" aria-expanded="false" aria-controls="primary-nav">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </nav>
  </div>
</header>
<div class="nav-backdrop" id="nav-backdrop" aria-hidden="true"></div>
