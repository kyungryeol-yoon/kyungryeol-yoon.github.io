{{- /* 태그 다중선택 필터 모달. 칩 토글 → 선택 태그 모두 포함(AND)하는 글을 /index.json에서 실시간 필터. */ -}}
<div class="tag-modal" id="tag-modal" hidden>
  <div class="tag-modal__overlay" data-tagm-close></div>
  <div class="tag-modal__dialog" role="dialog" aria-modal="true" aria-label="태그로 찾기">
    <div class="tag-modal__head">
      <span class="tag-modal__title">태그로 찾기 <span class="tag-modal__sel" id="tagm-selcount"></span></span>
      <button class="tag-modal__clear" id="tagm-clear" type="button" hidden>초기화</button>
    </div>
    <div class="tag-modal__search">
      <input type="text" id="tagm-filter" class="tag-modal__filter" placeholder="태그 검색…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="tag-chips" id="tagm-chips">
      {{ range $name, $taxonomy := site.Taxonomies.tags }}
        <button class="tag-chip" type="button" data-tag="{{ $name | urlize }}" data-name="{{ $name | lower }}" aria-pressed="false">{{ $name }} <span class="tag-chip-c">{{ len $taxonomy.Pages }}</span></button>
      {{ end }}
    </div>
    <div class="tag-results" id="tagm-results"></div>
    <div class="tag-modal__hint"><span><kbd>esc</kbd> 닫기</span></div>
  </div>
</div>
