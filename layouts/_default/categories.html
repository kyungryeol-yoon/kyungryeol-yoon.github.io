{{ define "main" }}
<div class="page-narrow">
  <div class="masthead">
    <h1>Categories</h1>
    <p>중첩 섹션 기반 — 같은 이름의 하위 카테고리도 상위 경로가 다르면 별도 페이지입니다.</p>
  </div>
  <div class="cat-tools">
    <button id="cat-expand-all" class="cat-tool-btn" type="button" aria-expanded="false">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      <span class="label">전체 펼치기</span>
    </button>
  </div>
  {{ partial "category-tree.html" site.Home }}

  {{ with site.Params.adsenseSlotMultiplex }}{{ partial "ad-unit.html" (dict "slot" . "format" "autorelaxed") }}{{ end }}
</div>
{{ end }}
