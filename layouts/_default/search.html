{{ define "main" }}
<div class="page-narrow">
  <div class="masthead">
    <h1>Search</h1>
    <p>제목과 본문 전문을 검색합니다.</p>
  </div>
  <div class="search-wrap">
    <link href="{{ "/pagefind/pagefind-ui.css" | relURL }}" rel="stylesheet">
    <div id="search"></div>
    <script src="{{ "/pagefind/pagefind-ui.js" | relURL }}"></script>
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        new PagefindUI({ element: "#search", showSubResults: true, showImages: false, translations: { placeholder: "검색어를 입력하세요", zero_results: "[SEARCH_TERM] 에 대한 결과가 없습니다" } });
      });
    </script>
  </div>
</div>
{{ end }}
