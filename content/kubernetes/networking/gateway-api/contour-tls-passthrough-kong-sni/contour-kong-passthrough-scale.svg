<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif">
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0E7490"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6D28D9"/></marker>
    <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#15803D"/></marker>
  </defs>
  <rect x="0" y="0" width="980" height="560" fill="#FFFFFF"/>

  <text x="490" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">단일 LB IP → Contour passthrough(도메인별) → Kong SNI 분배 → 여러 TCP 백엔드</text>

  <!-- Client -->
  <rect x="24" y="240" width="150" height="80" rx="11" fill="#F0FDF4" stroke="#15803D" stroke-width="1.5"/>
  <text x="99" y="268" text-anchor="middle" font-size="13.5" font-weight="700" fill="#14532D">클라이언트</text>
  <text x="99" y="288" text-anchor="middle" font-size="11" fill="#14532D">TLS + SNI</text>
  <text x="99" y="304" text-anchor="middle" font-size="10" fill="#14532D">(+stunnel로 SNI)</text>

  <!-- LB + Contour -->
  <rect x="214" y="150" width="204" height="264" rx="13" fill="#ECFEFF" stroke="#0E7490" stroke-width="1.8"/>
  <text x="316" y="176" text-anchor="middle" font-size="13.5" font-weight="700" fill="#164E63">단일 LB IP · Contour(Envoy)</text>
  <text x="316" y="194" text-anchor="middle" font-size="10.5" fill="#0E7490">passthrough — 복호화 안 함, SNI만 봄</text>

  <!-- HTTPProxy per domain -->
  <g fill="#164E63">
    <rect x="230" y="206" width="172" height="54" rx="8" fill="#FFFFFF" stroke="#0E7490" stroke-width="1.2"/>
    <text x="316" y="226" text-anchor="middle" font-size="11.5" font-weight="700">HTTPProxy: redis-cache</text>
    <text x="316" y="243" text-anchor="middle" font-size="9.5">fqdn: redis-cache.example.com</text>

    <rect x="230" y="268" width="172" height="54" rx="8" fill="#FFFFFF" stroke="#0E7490" stroke-width="1.2"/>
    <text x="316" y="288" text-anchor="middle" font-size="11.5" font-weight="700">HTTPProxy: redis-queue</text>
    <text x="316" y="305" text-anchor="middle" font-size="9.5">fqdn: redis-queue.example.com</text>

    <rect x="230" y="330" width="172" height="54" rx="8" fill="#FFFFFF" stroke="#0E7490" stroke-width="1.2"/>
    <text x="316" y="350" text-anchor="middle" font-size="11.5" font-weight="700">HTTPProxy: postgres</text>
    <text x="316" y="367" text-anchor="middle" font-size="9.5">fqdn: postgres-main.example.com</text>
  </g>

  <line x1="174" y1="280" x2="210" y2="280" stroke="#15803D" stroke-width="1.8" marker-end="url(#a3)"/>

  <!-- Kong -->
  <rect x="476" y="196" width="214" height="172" rx="13" fill="#F5F3FF" stroke="#6D28D9" stroke-width="1.8"/>
  <text x="583" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#4C1D95">Kong (kong-proxy:9443)</text>
  <text x="583" y="241" text-anchor="middle" font-size="10.5" fill="#6D28D9">stream :9443 ssl — 여기서 TLS 종단</text>
  <line x1="492" y1="256" x2="674" y2="256" stroke="#DDD6FE" stroke-width="1"/>
  <text x="583" y="278" text-anchor="middle" font-size="11" fill="#4C1D95" font-weight="700">SNI(Route.snis)로 최종 분배</text>
  <g font-size="10" fill="#4C1D95">
    <text x="583" y="299" text-anchor="middle">redis-cache.example.com</text>
    <text x="583" y="317" text-anchor="middle">redis-queue.example.com</text>
    <text x="583" y="335" text-anchor="middle">postgres-main.example.com</text>
    <text x="583" y="356" text-anchor="middle" font-size="9" fill="#6D28D9">→ 각 Kong Service</text>
  </g>

  <!-- three passthrough arrows all to Kong -->
  <g stroke="#0E7490" stroke-width="1.8">
    <line x1="402" y1="232" x2="472" y2="248" marker-end="url(#a1)"/>
    <line x1="402" y1="294" x2="472" y2="280" marker-end="url(#a1)"/>
    <line x1="402" y1="356" x2="472" y2="312" marker-end="url(#a1)"/>
  </g>
  <text x="437" y="200" text-anchor="middle" font-size="10" fill="#0E7490">봉투째(TLS 유지)</text>

  <!-- backends -->
  <g>
    <rect x="770" y="202" width="186" height="46" rx="9" fill="#F0FDF4" stroke="#15803D" stroke-width="1.3"/>
    <text x="863" y="222" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14532D">Redis (cache)</text>
    <text x="863" y="238" text-anchor="middle" font-size="10" fill="#14532D">redis-cache-svc</text>
    <rect x="770" y="262" width="186" height="46" rx="9" fill="#F0FDF4" stroke="#15803D" stroke-width="1.3"/>
    <text x="863" y="282" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14532D">Redis (queue)</text>
    <text x="863" y="298" text-anchor="middle" font-size="10" fill="#14532D">redis-queue-svc</text>
    <rect x="770" y="322" width="186" height="46" rx="9" fill="#F0FDF4" stroke="#15803D" stroke-width="1.3"/>
    <text x="863" y="342" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14532D">PostgreSQL</text>
    <text x="863" y="358" text-anchor="middle" font-size="10" fill="#14532D">postgres-svc</text>
  </g>
  <g stroke="#6D28D9" stroke-width="1.8">
    <line x1="690" y1="258" x2="766" y2="234" marker-end="url(#a2)"/>
    <line x1="690" y1="278" x2="766" y2="284" marker-end="url(#a2)"/>
    <line x1="690" y1="300" x2="766" y2="334" marker-end="url(#a2)"/>
  </g>

  <!-- Note -->
  <rect x="24" y="430" width="932" height="106" rx="11" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.3"/>
  <text x="42" y="456" font-size="12.5" font-weight="700" fill="#7C2D12">핵심 — SNI가 두 번 쓰인다 (도메인 일관성 필수)</text>
  <g font-size="11.5" fill="#7C2D12">
    <text x="42" y="478">① Contour: virtualhost.fqdn = redis-cache.example.com 으로 "이 HTTPProxy 담당인지" 매칭 (도메인마다 HTTPProxy 1개)</text>
    <text x="42" y="498">② Kong: Route.snis = redis-cache.example.com 으로 "어느 백엔드로" 최종 분배 → ①의 fqdn 과 ②의 snis 가 같아야 끝까지 연결</text>
    <text x="42" y="518">확장 = 백엔드 추가 시 "HTTPProxy(fqdn+passthrough) 1개 + Kong Service/Route(snis) 1세트" 만 늘리면 됨 · LB IP·포트는 그대로</text>
  </g>
</svg>
